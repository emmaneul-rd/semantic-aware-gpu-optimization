name: Tests & Reproducibility

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly run on Sunday

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r code/requirements.txt
        pip install pytest pytest-cov flake8 mypy
    
    - name: Lint with flake8
      run: |
        flake8 code/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 code/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Type checking with mypy
      run: |
        mypy code/ --ignore-missing-imports --no-error-summary || true
    
    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=code --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  reproducibility:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r code/requirements.txt
        pip install matplotlib
    
    - name: Validate environment
      run: |
        python scripts/validate_environment.py
    
    - name: Run Part 2 experiment
      run: |
        python code/parte_2_hypothesis_validation.py --iterations 5 --operations 10000
    
    - name: Run Part 3 experiment
      run: |
        python code/parte_3_semantic_batching.py --iterations 5 --tokens 10000
    
    - name: Run Part 4 analysis
      run: |
        python code/parte_4_overhead_analysis.py
    
    - name: Verify results match expected values
      run: |
        python scripts/validate_results.py
    
    - name: Generate report
      run: |
        python scripts/generate_report.py --output reproducibility_report.txt
    
    - name: Upload report as artifact
      uses: actions/upload-artifact@v3
      with:
        name: reproducibility-report
        path: reproducibility_report.txt
        retention-days: 30

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint black isort
    
    - name: Check code formatting with black
      run: |
        black --check code/ tests/ || true
    
    - name: Check import ordering with isort
      run: |
        isort --check-only code/ tests/ || true
    
    - name: Run pylint
      run: |
        pylint code/ --disable=all --enable=E,F || true

  docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r code/requirements.txt
        pip install sphinx sphinx-rtd-theme
    
    - name: Build documentation
      run: |
        cd docs && make html || echo "Documentation build skipped"
